{% extends "_base.html" %}

{% block title %}
    {{ translate('auth.sign_in.title') }} - {{ translate('app.title') }}
{% endblock title %}

{% block content %}
    <h1>{{ translate('auth.sign_in.title') }}</h1>

    <form method="post" action="{{ url_for('auth.signin') }}">
        {% include "_form_fields.html" %}
    </form>

    <p>
        <a href="{{ url_for('auth.signup') }}">{{ translate('auth.create_account') }}</a>
    </p>
{% endblock content %}
