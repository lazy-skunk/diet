<h2>Food Information</h2>
<table class="table table-bordered table-striped" id="food-table">
    <thead class="table-dark">
        <tr>
            <th scope="col">Food Name</th>
            <th scope="col">Energy (kcal/100g)</th>
            <th scope="col">Protein (g/100g)</th>
            <th scope="col">Fat (g/100g)</th>
            <th scope="col">Carbohydrates (g/100g)</th>
            <th scope="col">Grams Per Unit (g)</th>
            <th scope="col">Minimum Intake (units)</th>
            <th scope="col">Maximum Intake (units)</th>
            <th scope="col">Actions</th>
        </tr>
    </thead>
    <tbody id="food-inputs">
        <tr>
            <td>
                <input type="text" class="form-control" name="food-name" required />
            </td>
            <td>
                <input type="number"
                       class="form-control"
                       name="food-energy"
                       min="0"
                       step="any"
                       required />
            </td>
            <td>
                <input type="number"
                       class="form-control"
                       name="food-protein"
                       min="0"
                       step="any"
                       required />
            </td>
            <td>
                <input type="number"
                       class="form-control"
                       name="food-fat"
                       min="0"
                       step="any"
                       required />
            </td>
            <td>
                <input type="number"
                       class="form-control"
                       name="food-carbohydrates"
                       min="0"
                       step="any"
                       required />
            </td>
            <td>
                <input type="number"
                       class="form-control"
                       name="food-grams-per-unit"
                       min="1"
                       required />
            </td>
            <td>
                <input type="number"
                       class="form-control"
                       name="food-minimum-intake"
                       min="0"
                       required />
            </td>
            <td>
                <input type="number"
                       class="form-control"
                       name="food-maximum-intake"
                       min="0"
                       required />
            </td>
            <td class="no-action"></td>
        </tr>
    </tbody>
</table>

<button type="button" id="add-food" class="btn btn-outline-primary">
    Add Food
</button>

<template id="food-template">
    <tr>
        <td>
            <input type="text" class="form-control" name="food-name" required />
        </td>
        <td>
            <input type="number"
                   class="form-control"
                   name="food-energy"
                   min="0"
                   step="any"
                   required />
        </td>
        <td>
            <input type="number"
                   class="form-control"
                   name="food-protein"
                   min="0"
                   step="any"
                   required />
        </td>
        <td>
            <input type="number"
                   class="form-control"
                   name="food-fat"
                   min="0"
                   step="any"
                   required />
        </td>
        <td>
            <input type="number"
                   class="form-control"
                   name="food-carbohydrates"
                   min="0"
                   step="any"
                   required />
        </td>
        <td>
            <input type="number"
                   class="form-control"
                   name="food-grams-per-unit"
                   min="1"
                   required />
        </td>
        <td>
            <input type="number"
                   class="form-control"
                   name="food-minimum-intake"
                   min="0"
                   required />
        </td>
        <td>
            <input type="number"
                   class="form-control"
                   name="food-maximum-intake"
                   min="0"
                   required />
        </td>
        <td>
            <button type="button" class="btn btn-outline-danger">Remove</button>
        </td>
    </tr>
</template>
